appId: dev.innei.kansoku
productName: Kansoku
# Brand asset: app/web/public/brand/kansoku-icon.svg — rebuild with scripts/generate-icon.sh
icon: build/icon.icns
directories:
  output: release
  buildResources: build
electronLanguages:
  - en
  - zh_CN
afterPack: scripts/afterPack.cjs
afterAllArtifactBuild: scripts/afterAllArtifactBuild.cjs
files:
  - dist-main/**
  - dist-preload/**
  - native/sparkle-bridge/build/Release/sparkle_bridge.node
  - package.json
  - "!**/*.ts"
extraResources:
  - from: ../web/dist
    to: web-dist
  - from: ../packages/core/drizzle
    to: drizzle
extraFiles:
  - from: native/sparkle-bridge/vendor/Sparkle.framework
    to: Frameworks/Sparkle.framework
asarUnpack:
  - "**/node_modules/better-sqlite3/**"
  - "**/native/sparkle-bridge/build/**"
dmg:
  writeUpdateInfo: false
mac:
  icon: build/icon.icns
  target:
    - target: dmg
      arch: [arm64]
    - target: zip
      arch: [arm64]
  identity: null
  extendInfo:
    SUFeedURL: https://github.com/Innei/kansoku/releases/latest/download/appcast.xml
    # CI injects the real EdDSA public key over this placeholder at build time — keep it
    # greppable (SPARKLE_ED_PUBLIC_KEY_PLACEHOLDER) so that step has a stable anchor.
    SUPublicEDKey: SPARKLE_ED_PUBLIC_KEY_PLACEHOLDER
    SUEnableInstallerLauncherService: false
