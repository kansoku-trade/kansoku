packages:
  - packages/core
  - packages/bench
  - packages/pro-api
  - packages/shared
  - apps/license-worker
  - apps/pro
  - apps/server
  - apps/web
  - apps/desktop
autoInstallPeers: false
ignoredOptionalDependencies:
  - esbuild
  - tsx
allowBuilds:
  '@google/genai': false
  better-sqlite3: true
  # Electron's postinstall downloads the binary; blocking it defers the download
  # to the first require('electron'), and parallel vitest workers then race the
  # same dist/ extraction (proven flaky-fatal in CI: locales/fa.pak collision).
  electron: true
  electron-sparkle-updater: true
  esbuild: true
  protobufjs: false
  sharp: true
  unrs-resolver: false
  workerd: true
minimumReleaseAgeExclude:
  - '@earendil-works/pi-ai@0.80.6'
  - '@earendil-works/pi-agent-core@0.80.6'
  - tsdown@0.22.5
  - electron-sparkle-updater@0.1.0
patchedDependencies:
  app-builder-lib@26.15.3: patches/app-builder-lib@26.15.3.patch
