appId: dev.innei.kansoku
productName: Kansoku
# Brand asset: apps/web/public/brand/kansoku-icon.svg — rebuild with scripts/generate-icon.sh
icon: build/icon.icns
directories:
  output: release
  buildResources: build
electronLanguages:
  - en
  - zh_CN
afterPack: scripts/afterPack.cjs
afterAllArtifactBuild: scripts/afterAllArtifactBuild.cjs
files:
  - dist-main/**
  # Plaintext pro chunks are deleted by stagePro.mjs before packaging; this
  # exclusion plus afterPack's canary scan back that up.
  - '!dist-main/__pro__/**'
  - dist-preload/**
  # Pro slot bundle staged by scripts/stagePro.mjs as an encrypted blob — must
  # live inside the asar so the decryption path's virtual file: root resolves
  # bare imports (@tsuki-hono/*) to the same node_modules copy the main bundle
  # uses (single instance). Matches nothing on free builds.
  - pro/pro.enc
  - package.json
  # Production packages often publish source maps, declarations, and native
  # build inputs alongside their runtime files. None of these are read by the
  # packaged app.
  - '!**/*.ts'
  - '!**/*.d.cts'
  - '!**/*.d.mts'
  - '!**/*.map'
  # electron-rebuild leaves both its ABI cache and the complete node-gyp build
  # tree behind. bindings loads build/Release/better_sqlite3.node at runtime;
  # keep that one binary and discard the duplicate cache, sources, and objects.
  - '!**/node_modules/better-sqlite3/binding.gyp'
  - '!**/node_modules/better-sqlite3/bin/**'
  - '!**/node_modules/better-sqlite3/deps/**'
  - '!**/node_modules/better-sqlite3/src/**'
  - '!**/node_modules/better-sqlite3/build/deps/**'
  - '!**/node_modules/better-sqlite3/build/Release/obj/**'
  - '!**/node_modules/better-sqlite3/build/Release/test_extension.node'
  # Build/install tools are production dependencies of the two native modules,
  # but they are never executed after electron-rebuild has produced the addons.
  - '!**/node_modules/node-addon-api/**'
  - '!**/node_modules/node-gyp/**'
  - '!**/node_modules/prebuild-install/**'
  - '!**/node_modules/tar/**'
  - '!**/node_modules/tar-fs/**'
  - '!**/node_modules/electron-sparkle-updater/bin/**'
  # dist/builder.js is NOT build-only — updater.ts imports SPARKLE_ED_PUBLIC_KEY_PLACEHOLDER
  # from 'electron-sparkle-updater/builder' at runtime; excluding it breaks the packaged app
  # with ERR_MODULE_NOT_FOUND. Only dist/cli.js backs the CLI bin, never imported at runtime.
  - '!**/node_modules/electron-sparkle-updater/dist/cli.js'
  - '!**/node_modules/electron-sparkle-updater/native/scripts/**'
  - '!**/node_modules/electron-sparkle-updater/native/src/**'
  - '!**/node_modules/electron-sparkle-updater/native/vendor/**'
extraResources:
  - from: ../web/dist
    to: web-dist
    # Mirrors dist-main's own '!dist-main/__pro__/**' exclusion above: unlike
    # dist-main, this copy previously had no filter at all, so a pro-enabled
    # web build's __pro__ chunk shipped straight into Resources/web-dist
    # regardless of stagePro.mjs. stagePro deletes it before packaging on a
    # normal `pnpm package` run; this filter is what stops it if that step is
    # ever skipped or electron-builder is invoked directly.
    filter:
      - '**/*'
      - '!assets/__pro__/**'
  - from: build/icon.png
    to: icon.png
  - from: ../../packages/core/drizzle
    to: drizzle
  # Agent skill texts + scripts (intraday-signal, options-payoff, …). Linked
  # into the data root at boot so analyst reassess can read SKILL.md.
  # dist-skills is staged by scripts/stageSkills.mjs — .claude/skills holds
  # symlinks into .agents that electron-builder would copy as dead links.
  - from: dist-skills
    to: skills
  - from: dist-agent-kit
    to: kansoku-agent-kit
extraFiles:
  - from: node_modules/electron-sparkle-updater/native/vendor/Sparkle.framework
    to: Frameworks/Sparkle.framework
asar:
  # Native addons are listed explicitly below. Electron Builder's smart
  # unpacker otherwise expands the match to each addon package in full.
  smartUnpack: false
asarUnpack:
  - '**/node_modules/better-sqlite3/build/Release/better_sqlite3.node'
  - '**/node_modules/electron-sparkle-updater/native/build/Release/*.node'
# Updates ship via Sparkle, not electron-updater — skip blockmaps for both targets.
# dmg has a native knob; zip needs the app-builder-lib patch (patches/app-builder-lib@…).
dmg:
  writeUpdateInfo: false
zip:
  writeUpdateInfo: false
mac:
  icon: build/icon.icns
  target:
    - target: dmg
      arch: [arm64]
    - target: zip
      arch: [arm64]
  identity: null
  extendInfo:
    SUFeedURL: https://github.com/Innei/kansoku/releases/latest/download/appcast.xml
    # CI injects the real EdDSA public key over this placeholder at build time — keep it
    # greppable (SPARKLE_ED_PUBLIC_KEY_PLACEHOLDER) so that step has a stable anchor.
    SUPublicEDKey: SPARKLE_ED_PUBLIC_KEY_PLACEHOLDER
    SUEnableInstallerLauncherService: false
    SUScheduledCheckInterval: 3600
    CFBundleURLTypes:
      - CFBundleURLName: dev.innei.kansoku
        CFBundleURLSchemes:
          - kansoku
