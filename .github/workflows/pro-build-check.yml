name: pro-build-check

on:
  workflow_dispatch:

concurrency:
  group: pro-build-check
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: fetch pro slot
        env:
          KANSOKU_PRO_REPO_URL: ${{ secrets.KANSOKU_PRO_REPO_URL }}
        run: scripts/fetch-pro.sh

      - name: assert pro slot present
        run: test -f apps/pro/src/index.ts

      - name: install dependencies
        run: pnpm install --frozen-lockfile

      - name: typecheck
        run: pnpm -r typecheck

      - name: build
        run: |
          pnpm --filter @kansoku/web build
          pnpm --filter @kansoku/desktop build

      - name: pro tests
        run: pnpm --filter @kansoku/pro test
