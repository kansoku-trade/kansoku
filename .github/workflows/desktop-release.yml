name: desktop-release

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "release tag (desktop-vX.Y.Z), must already exist"
        required: true
        type: string

concurrency:
  group: desktop-release-${{ inputs.tag || github.ref }}
  cancel-in-progress: false

env:
  REPO_SLUG: "Innei/kansoku"

jobs:
  release:
    runs-on: macos-14
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: version consistency check (tag vs desktop package.json)
        id: version
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          TAG="${INPUT_TAG:-${GITHUB_REF#refs/tags/}}"
          case "$TAG" in
            desktop-v*) ;;
            *)
              echo "::error::tag $TAG does not match desktop-vX.Y.Z"
              exit 1
              ;;
          esac
          TAG_VERSION="${TAG#desktop-v}"
          PKG_VERSION="$(node -p "require('./apps/desktop/package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::tag $TAG (version $TAG_VERSION) does not match apps/desktop/package.json version $PKG_VERSION"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

      - name: assert Sparkle secrets present (fail fast — an empty public key would be silently baked into the app)
        env:
          SPARKLE_ED_PUBLIC_KEY: ${{ secrets.SPARKLE_ED_PUBLIC_KEY }}
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          if [ -z "$SPARKLE_ED_PUBLIC_KEY" ] || [ -z "$SPARKLE_ED_PRIVATE_KEY" ]; then
            echo "::error::SPARKLE_ED_PUBLIC_KEY / SPARKLE_ED_PRIVATE_KEY repo secrets are missing or empty"
            exit 1
          fi

      - name: extract release notes from CHANGELOG (fail fast, before the build)
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES_FILE="$RUNNER_TEMP/release-notes.md"
          awk -v ver="$VERSION" '
            $0 ~ "^## " ver "( |$)" { found = 1; next }
            found && /^## / { exit }
            found { print }
          ' apps/desktop/CHANGELOG.md > "$NOTES_FILE"
          if ! grep -q '[^[:space:]]' "$NOTES_FILE"; then
            echo "::error::no \"## $VERSION\" section found in apps/desktop/CHANGELOG.md — run the release skill (or add the section) before tagging"
            exit 1
          fi
          echo "file=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          # only the content-addressable pnpm store is cached, never node_modules —
          # a cached node_modules can carry a stale @electron/rebuild forge-meta
          # entry that lies about better-sqlite3 already being built for Electron's
          # ABI (see commit 39aa0f5).
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      # apps/pro (@kansoku/pro, the AI slot) lives in a private repo. Until
      # KANSOKU_PRO_REPO_URL + a deploy key are configured as repo secrets,
      # this step is a no-op and the release stays free-only. Once configured
      # it pulls apps/pro in before install, pnpm picks it up as a workspace
      # member, and `pnpm package` (via scripts/stagePro.mjs) builds and
      # stages pro into the asar.
      - name: fetch pro slot (optional — free build until KANSOKU_PRO_REPO_URL is configured)
        env:
          KANSOKU_PRO_REPO_URL: ${{ secrets.KANSOKU_PRO_REPO_URL }}
        run: scripts/fetch-pro.sh || echo "pro slot not configured, continuing with a free-only release build"

      # the root prepare script (skills experimental_install) restores third-party
      # skills into .claude/skills so stageSkills.mjs can bundle them into the app.
      - name: install dependencies
        run: pnpm install --frozen-lockfile

      # the prepare script above creates .agents/skills (third-party copies only),
      # which un-skips agentsSkillsParity.test.ts — link the first-party skills in
      # so the guard sees the same layout it enforces locally.
      - name: link first-party skills into .agents
        run: python3 scripts/sync-agents-skills.py

      - name: typecheck (pro-api, core, server, web, desktop)
        run: pnpm -r typecheck

      - name: test — core, web, desktop
        run: |
          pnpm --filter @kansoku/core test
          pnpm --filter @kansoku/web test
          pnpm --filter @kansoku/desktop test

      - name: test — server (json report for the known-failure gate)
        working-directory: apps/server
        # no leading `--` here: pnpm forwards it verbatim to the underlying
        # `vitest run` script, which then reads it as a positional file filter
        # instead of a flag separator, and --reporter/--outputFile are silently
        # swallowed as filter globs instead of applied.
        run: pnpm test --reporter=json --outputFile=test-results.json || true

      - name: gate — server suite has no NEW failures
        run: node .github/scripts/assert-known-test-failures.mjs apps/server/test-results.json

      - name: clear native-module rebuild cache (pnpm package forces the real rebuild)
        working-directory: apps/desktop
        run: rm -rf node_modules/better-sqlite3/build "$HOME/Library/Caches/electron-rebuild"

      - name: inject SUPublicEDKey into electron-builder.yml
        env:
          SPARKLE_ED_PUBLIC_KEY: ${{ secrets.SPARKLE_ED_PUBLIC_KEY }}
        # runs after `pnpm install` so the workspace bin resolves — root-level
        # npx cannot see electron-sparkle-updater (it's only a dependency of
        # apps/desktop, not the workspace root), so this uses pnpm --filter
        # exec instead.
        run: |
          pnpm --filter @kansoku/desktop exec -- electron-sparkle-updater inject-public-key \
            --file electron-builder.yml

      - name: build web
        run: pnpm --filter @kansoku/web build

      - name: package desktop (dmg + zip, no paid signing identity)
        working-directory: apps/desktop
        run: pnpm package

      - name: verify ad-hoc signature (dmg + zip both embed the afterPack-signed app)
        working-directory: apps/desktop
        run: |
          # electron-builder.yml's afterPack hook (scripts/afterPack.cjs)
          # ad-hoc signs the .app once, before either target is packaged, so
          # both the dmg and the zip embed an already-valid CodeDirectory —
          # this step only has to confirm that, not re-sign or re-zip.
          # generate_appcast refuses any archive whose .app doesn't pass
          # `codesign --verify --deep --strict`.
          ZIP_PATH="$PWD/$(echo release/*.zip)"
          DMG_PATH="$PWD/$(echo release/*.dmg)"

          ZIP_EXTRACT_DIR="$(mktemp -d)"
          ditto -x -k "$ZIP_PATH" "$ZIP_EXTRACT_DIR"
          codesign --verify --deep --strict "$ZIP_EXTRACT_DIR"/*.app
          rm -rf "$ZIP_EXTRACT_DIR"

          DMG_MOUNT_DIR="$(mktemp -d)"
          hdiutil attach "$DMG_PATH" -mountpoint "$DMG_MOUNT_DIR" -nobrowse -quiet
          codesign --verify --deep --strict "$DMG_MOUNT_DIR"/*.app
          hdiutil detach "$DMG_MOUNT_DIR" -quiet

      - name: prepare release archive dir
        id: archive
        run: |
          ARCHIVE_DIR="$RUNNER_TEMP/release-archive"
          mkdir -p "$ARCHIVE_DIR"
          # only the zip goes into ARCHIVE_DIR — that's the directory
          # generate_appcast scans, and an unsigned dmg would just be skipped
          # with a warning (or worse, confuse delta-base detection). The dmg
          # is uploaded to the release directly from apps/desktop/release/.
          cp apps/desktop/release/*.zip "$ARCHIVE_DIR/"
          # a .md with the same basename as the zip is how generate_appcast picks up
          # release notes; with --embed-release-notes below they land in the appcast
          # <description sparkle:format="markdown"> so the Sparkle dialog shows them.
          ZIP_BASE="$(basename apps/desktop/release/*.zip .zip)"
          cp "${{ steps.notes.outputs.file }}" "$ARCHIVE_DIR/$ZIP_BASE.md"
          {
            echo "dir=$ARCHIVE_DIR"
            echo "dmg_path=$(echo apps/desktop/release/*.dmg)"
            echo "zip_name=$(basename apps/desktop/release/*.zip)"
          } >> "$GITHUB_OUTPUT"

      - name: sign, generate appcast, and publish GitHub Release (electron-sparkle-updater)
        uses: Innei/electron-sparkle-updater/action@v1
        with:
          tag: ${{ steps.version.outputs.tag }}
          repo: ${{ env.REPO_SLUG }}
          tag-prefix: "desktop-v"
          archive-dir: ${{ steps.archive.outputs.dir }}
          ed-private-key: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
          publish: "true"
          dmg-path: ${{ steps.archive.outputs.dmg_path }}
          notes-file: ${{ steps.notes.outputs.file }}
