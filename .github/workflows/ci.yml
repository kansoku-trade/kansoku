name: ci

on:
  pull_request:
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'patches/**'
      - 'scripts/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/**'
  push:
    branches:
      - main
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'patches/**'
      - 'scripts/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      # apps/pro (@kansoku/pro, the AI slot) is gitignored and lives in a
      # separate private repo — a checkout here never has it. This is the
      # standing "community can build without the AI slot" verification;
      # this step just makes that assumption explicit instead of implicit.
      - name: assert pro slot absent (this is the free-state build)
        run: |
          if [ -e apps/pro ]; then
            echo "::error::apps/pro exists on a public CI checkout — it should be gitignored, not committed"
            exit 1
          fi

      - name: assert no tracked overlay artifacts
        run: |
          pro_files="$(git ls-files -- '*.pro.ts' '*.pro.tsx' '*.pro.mts' '*.pro.cts')"
          if [ -n "$pro_files" ]; then
            echo "::error::tracked *.pro.* overlay projection files found in the public repo:"
            echo "$pro_files"
            exit 1
          fi

          oss_files="$(git ls-files -- '*.oss.ts' '*.oss.tsx' '*.oss.mts' '*.oss.cts')"
          if [ -n "$oss_files" ]; then
            echo "::error::tracked *.oss.* files found in the public repo (retired suffix shape must not return):"
            echo "$oss_files"
            exit 1
          fi

          state_file="$(git ls-files -- '.kansoku-overlay-links.json')"
          if [ -n "$state_file" ]; then
            echo "::error::tracked .kansoku-overlay-links.json found in the public repo — overlay sync state must stay untracked:"
            echo "$state_file"
            exit 1
          fi

      - name: install dependencies
        run: pnpm install --frozen-lockfile

      # the prepare script above creates .agents/skills (third-party copies only),
      # which un-skips agentsSkillsParity.test.ts — link the first-party skills in
      # so the guard sees the same layout it enforces locally.
      - name: link first-party skills into .agents
        run: python3 scripts/sync-agents-skills.py

      - name: typecheck (pro-api, core, server, web, desktop)
        run: pnpm -r typecheck

      - name: build (web, desktop main — the compile step that would have caught a bundling regression)
        run: |
          pnpm --filter @kansoku/web build
          pnpm --filter @kansoku/desktop build

      - name: test — core, web, desktop
        run: |
          pnpm --filter @kansoku/core test
          pnpm --filter @kansoku/web test
          pnpm --filter @kansoku/desktop test

      - name: test — server (json report for the known-failure gate)
        working-directory: apps/server
        # no leading `--` here: pnpm forwards it verbatim to the underlying
        # `vitest run` script, which then reads it as a positional file filter
        # instead of a flag separator, and --reporter/--outputFile are silently
        # swallowed as filter globs instead of applied.
        run: pnpm test --reporter=json --outputFile=test-results.json || true

      - name: gate — server suite has no NEW failures
        run: node .github/scripts/assert-known-test-failures.mjs apps/server/test-results.json

      - name: gate — working tree still clean after Community build
        run: |
          dirty="$(git status --porcelain -- . ':!apps/server/test-results.json')"
          if [ -n "$dirty" ]; then
            echo "::error::working tree is not clean after the Community build:"
            echo "$dirty"
            exit 1
          fi
